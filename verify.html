<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Payment - Orbit Universe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(135deg, #03010a 0%, #0b1626 40%, #100a1c 70%, #05020c 100%);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; color: white; -webkit-font-smoothing: antialiased;
    }

    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; transform: translateZ(0); }
    .nebula { background: radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(50, 150, 255, 0.1) 0%, transparent 50%); filter: blur(30px); }
    
    .glass-box {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.25); border-left: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px; padding: 2.5rem 2rem; width: 100%; max-width: 600px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.02);
      margin: 1rem 0; transform: translateZ(0);
    }

    .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .btn-glass { display: inline-block; padding: 8px 16px; color: white; text-decoration: none; font-weight: 500; font-size: 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; transition: all 0.3s ease; }
    .btn-glass:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

    h1 { font-size: clamp(2rem, 6vw, 2.5rem); margin: 0 0 10px 0; background: linear-gradient(to right, #ffffff, #c7b8ff, #ffec8c); -webkit-background-clip: text; color: transparent; text-align: center; }
    
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label { display: block; color: #fff; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
    
    .glass-input {
      width: 100%; padding: 15px; border-radius: 12px; color: white; font-size: 1rem;
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px); transition: all 0.3s ease; outline: none; font-family: inherit;
    }
    .glass-input:focus { border-color: #c7b8ff; background: rgba(255, 255, 255, 0.08); }

    /* Custom Searchable Dropdown */
    #productDropdown {
        display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
        background: rgba(11, 22, 38, 0.95); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; margin-top: 5px;
        max-height: 200px; overflow-y: auto;
    }
    .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .dropdown-item:hover { background: rgba(199, 184, 255, 0.2); }

    /* Payment Instructions Box */
    .payment-info {
        display: none; background: rgba(226, 21, 111, 0.1); border: 1px solid #e2156f;
        border-radius: 12px; padding: 15px; margin-top: 15px; text-align: center;
    }
    .payment-info.active { display: block; animation: fadeIn 0.5s ease; }
    .bkash-number { font-size: 1.5rem; font-weight: bold; color: #e2156f; margin: 10px 0; letter-spacing: 2px; }
    .amount-display { font-size: 1.2rem; color: #ffc2eb; font-weight: bold; }

    .btn-submit {
      display: inline-block; width: 100%; padding: 15px; margin-top: 20px; cursor: pointer;
      background: linear-gradient(90deg, #8a2be2, #4b0082); color: white; font-size: 1.1rem;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; font-weight: 600; letter-spacing: 2px;
      transition: all 0.3s ease;
    }
    .btn-submit:hover { background: linear-gradient(90deg, #9932cc, #4b0082); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(138, 43, 226, 0.4); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-layer nebula"></div>
  
  <div class="glass-box">
    <div class="header-nav">
        <a href="store.html" class="btn-glass">← Store</a>
    </div>

    <h1>Verify Payment</h1>

    <form id="verifyForm">
        <div class="form-group">
            <label>1. Select Purchased Item</label>
            <input type="text" id="productSearch" class="glass-input" placeholder="Search product..." autocomplete="off" required>
            <div id="productDropdown"></div>
        </div>

        <div id="paymentBox" class="payment-info">
            <p style="margin:0; color:#b3b3cc;">Send Money to this bKash Personal Number:</p>
            <div class="bkash-number">+8801611026722</div>
            <div class="amount-display" id="displayAmount">Amount: ৳0</div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label>2. Your bKash TrxID</label>
            <input type="text" id="trxId" class="glass-input" placeholder="e.g. 9K2A5B8C..." required>
        </div>

        <div class="form-group">
            <label>3. Your WhatsApp Number</label>
            <input type="tel" id="userWa" class="glass-input" placeholder="e.g. 01XXXXXXXXX" required>
        </div>

        <button type="submit" class="btn-submit">VERIFY NOW</button>
    </form>
  </div>

  <script>
    // Product List & Prices
    const products = [
        { name: "Bybit Dual Currency VISA Card", price: 599 },
        { name: "Redotpay Dual Currency VISA Card", price: 480 },
        { name: "Google Super Pack (5TB + Gemini AI)", price: 99 }
    ];

    const searchInput = document.getElementById('productSearch');
    const dropdown = document.getElementById('productDropdown');
    const paymentBox = document.getElementById('paymentBox');
    const displayAmount = document.getElementById('displayAmount');
    let selectedPrice = 0;

    // Search Logic
    searchInput.addEventListener('input', function() {
        dropdown.innerHTML = '';
        const filter = this.value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(filter));
        
        if (filtered.length > 0) {
            dropdown.style.display = 'block';
            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerText = `${p.name} - ৳${p.price}`;
                div.onclick = function() {
                    searchInput.value = p.name;
                    selectedPrice = p.price;
                    dropdown.style.display = 'none';
                    
                    // Show Payment Info Box
                    paymentBox.classList.add('active');
                    displayAmount.innerText = `Amount to Send: ৳${p.price}`;
                };
                dropdown.appendChild(div);
            });
        } else {
            dropdown.style.display = 'none';
        }
    });

    // Hide dropdown when clicked outside
    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) dropdown.style.display = 'none';
    });

    // Form Submit to WhatsApp Auto-Message
    document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const item = searchInput.value;
        const trx = document.getElementById('trxId').value;
        const number = document.getElementById('userWa').value;

        // Message Formatting
        const message = `*New Order Verification* 🚀\n\n*Item:* ${item}\n*Amount:* ৳${selectedPrice}\n*TrxID:* ${trx}\n*Customer WA:* ${number}`;
        
        // Open WhatsApp Web/App directly with pre-filled message to your number
        const waLink = `https://wa.me/8801611026722?text=${encodeURIComponent(message)}`;
        window.open(waLink, '_blank');
    });
  </script>
</body>
</html>
