<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Payment - Orbit Universe</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(135deg, #03010a 0%, #0b1626 40%, #100a1c 70%, #05020c 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; color: white; -webkit-font-smoothing: antialiased;
    }

    /* Fixed Background Layers */
    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; transform: translateZ(0); }
    .nebula { background: radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(50, 150, 255, 0.1) 0%, transparent 50%); filter: blur(30px); }
    .falling-stars { background: transparent url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; animation: drift 100s linear infinite; }
    .meteor { position: absolute; width: 150px; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%); opacity: 0; transform: rotate(-45deg); will-change: transform, opacity; }
    .meteor:nth-child(1) { top: -10%; left: 30%; animation: shoot 4s linear infinite 1s; }
    .meteor:nth-child(2) { top: -20%; left: 70%; animation: shoot 6s linear infinite 3s; }
    .meteor:nth-child(3) { top: 10%; left: 110%; animation: shoot 5s linear infinite 0s; }

    /* Ultra Clear Main Glass Box */
    .glass-box {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.25); border-left: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px; padding: 3rem 2rem; width: 100%; max-width: 600px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.02);
      margin: 2rem 0; transform: translateZ(0); text-align: center;
    }

    .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .btn-glass { display: inline-block; padding: 10px 20px; color: white; text-decoration: none; font-weight: 500; letter-spacing: 1px; font-size: 0.9rem; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0)); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; transition: all 0.3s ease; backdrop-filter: blur(4px); }
    .btn-glass:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    h1 { font-size: clamp(2rem, 6vw, 3rem); margin: 0; background: linear-gradient(to right, #ffffff, #c7b8ff, #ffec8c); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
    p { color: #b3b3cc; font-size: 1rem; letter-spacing: 1px; margin: 10px 0 30px; font-weight: 300; }

    /* Glass Form Elements */
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; color: #fff; margin-bottom: 8px; font-weight: 500; letter-spacing: 1px; font-size: 0.9rem; }
    
    .glass-input {
      width: 100%; padding: 15px; border-radius: 12px; color: white; font-size: 1rem;
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px); transition: all 0.3s ease; outline: none; font-family: inherit;
    }
    .glass-input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .glass-input:focus { border-color: #c7b8ff; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 15px rgba(199, 184, 255, 0.2); }
    
    select.glass-input option { background: #0b1626; color: white; }

    /* Dynamic Payment Info Box */
    .payment-instruction {
        display: none; background: rgba(226, 21, 111, 0.15); border: 1px solid rgba(226, 21, 111, 0.5);
        border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center;
        animation: fadeIn 0.4s ease-in-out;
    }
    .payment-instruction h2 { margin: 5px 0; color: #e2156f; letter-spacing: 2px; }
    .payment-instruction .amount-text { color: #ffc2eb; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

    /* Error Message */
    .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 5px; display: none; }

    .btn-submit {
      display: inline-block; width: 100%; padding: 15px; margin-top: 10px; cursor: pointer;
      background: linear-gradient(90deg, #8a2be2, #4b0082); color: white; font-size: 1.1rem;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; font-weight: 600; letter-spacing: 2px;
      transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3); font-family: inherit;
    }
    .btn-submit:hover { background: linear-gradient(90deg, #9932cc, #4b0082); box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6); transform: translateY(-2px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes drift { from { background-position: 0 0; } to { background-position: -1000px 1000px; } }
    @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; } 100% { transform: translateX(-1500px) translateY(1500px) rotate(-45deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="bg-layer nebula"></div><div class="bg-layer falling-stars"></div>
  <div class="bg-layer"><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div></div>
  
  <div class="glass-box">
    <div class="header-nav">
        <a href="store.html" class="btn-glass">← Store</a>
        <a href="support.html" class="btn-glass">Support 🎧</a>
    </div>

    <h1>Verify Payment</h1>
    <p>SUBMIT YOUR TRXID TO RECEIVE YOUR ORDER</p>

    <form id="verifyForm">
        
        <div class="form-group">
            <label>1. Select Purchased Item</label>
            <select id="itemInput" class="glass-input" required>
                <option value="" disabled selected>Select an item...</option>
                <option value="Bybit Dual Currency VISA Card - ৳599">Bybit Dual Currency VISA Card - ৳599</option>
                <option value="Redotpay Dual Currency VISA Card - ৳480">Redotpay Dual Currency VISA Card - ৳480</option>
                <option value="Google Super Pack - ৳99">Google Super Pack - ৳99</option>
            </select>
        </div>

        <div class="form-group">
            <label>2. Payment Method</label>
            <select id="methodInput" class="glass-input" required>
                <option value="" disabled selected>Select method used...</option>
                <option value="bkash">bKash (Available)</option>
                <option value="nagad" disabled>Nagad (Currently Unavailable)</option>
                <option value="rocket" disabled>Rocket (Currently Unavailable)</option>
                <option value="binance" disabled>Binance Pay (Currently Unavailable)</option>
            </select>
        </div>

        <div id="paymentBox" class="payment-instruction">
            <p style="margin: 0; color: #fff; font-size: 0.9rem;">Please <b>Send Money</b> to this bKash Personal Number:</p>
            <h2>+8801611026722</h2>
            <div id="amountDisplay" class="amount-text">Amount: ৳0</div>
        </div>

        <div class="form-group">
            <label>3. Transaction ID (TrxID)</label>
            <input type="text" id="trxInput" class="glass-input" placeholder="e.g. 9K2A5B8C..." maxlength="10" required>
            <div id="trxError" class="error-msg">TrxID must be exactly 10 characters (letters and numbers only).</div>
        </div>

        <div class="form-group">
            <label>4. Your WhatsApp Number</label>
            <input type="tel" id="waInput" class="glass-input" placeholder="e.g. 01XXXXXXXXX" required>
        </div>

        <div class="form-group">
            <label>5. Human Verification: What is <span id="captchaQuestion"></span>?</label>
            <input type="number" id="captchaInput" class="glass-input" placeholder="Enter answer..." required>
        </div>

        <button type="submit" class="btn-submit">VERIFY NOW</button>
    </form>
  </div>

  <script>
    const itemInput = document.getElementById('itemInput');
    const methodInput = document.getElementById('methodInput');
    const paymentBox = document.getElementById('paymentBox');
    const amountDisplay = document.getElementById('amountDisplay');
    const trxInput = document.getElementById('trxInput');
    const trxError = document.getElementById('trxError');

    // Captcha Logic setup
    let num1 = Math.floor(Math.random() * 10) + 1;
    let num2 = Math.floor(Math.random() * 10) + 1;
    let captchaAns = num1 + num2;
    document.getElementById('captchaQuestion').innerText = `${num1} + ${num2}`;

    // Function to dynamically show payment info
    function updatePaymentInfo() {
        const itemVal = itemInput.value;
        const methodVal = methodInput.value;
        const priceMatch = itemVal.match(/৳(\d+)/);
        
        if (methodVal === 'bkash' && priceMatch) {
            amountDisplay.innerText = `Amount to Send: ৳${priceMatch[1]}`;
            paymentBox.style.display = 'block';
        } else {
            paymentBox.style.display = 'none';
        }
    }

    itemInput.addEventListener('change', updatePaymentInfo);
    methodInput.addEventListener('change', updatePaymentInfo);

    // Form Submit handling (Validation + Telegram API + WhatsApp redirect)
    document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop default form submission
        
        // 1. Verify Captcha
        const userAnswer = parseInt(document.getElementById('captchaInput').value);
        if(userAnswer !== captchaAns) {
            alert("Incorrect Math Answer! Are you a robot?");
            return;
        }

        // 2. Verify TrxID (exactly 10 chars, letters & numbers)
        const trx = trxInput.value.trim();
        const trxRegex = /^[A-Za-z0-9]{10}$/;
        if(!trxRegex.test(trx)) {
            trxError.style.display = 'block';
            return;
        } else {
            trxError.style.display = 'none';
        }

        // Get details
        const item = itemInput.value;
        const method = methodInput.value;
        const userWa = document.getElementById('waInput').value;
        const priceMatch = item.match(/৳(\d+)/);
        const price = priceMatch ? priceMatch[1] : 'N/A';

        const orderDetails = `*New Payment Verification* 🚀\n\n*Item:* ${item}\n*Amount:* ৳${price}\n*Method:* ${method.toUpperCase()}\n*TrxID:* ${trx}\n*Customer WA:* ${userWa}`;

        // 3. Send to Telegram via Bot API (Invisible to user)
        // REPLACE 'YOUR_BOT_TOKEN' AND 'YOUR_CHAT_ID' WITH ACTUAL VALUES
        const botToken = 'YOUR_BOT_TOKEN'; 
        const chatId = 'YOUR_CHAT_ID';
        
        if(botToken !== 'YOUR_BOT_TOKEN') {
            const tgUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(orderDetails)}&parse_mode=Markdown`;
            fetch(tgUrl).catch(err => console.log("Telegram Error", err));
        }

        // 4. Redirect to WhatsApp (Visible to user)
        const waUrl = `https://wa.me/8801611026722?text=${encodeURIComponent(orderDetails)}`;
        window.open(waUrl, '_blank');
        
        // Optionally reset form after submission
        // this.reset();
    });
  </script>
</body>
</html>
