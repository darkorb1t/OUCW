<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Support & Community</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(135deg, #03010a 0%, #0b1626 40%, #100a1c 70%, #05020c 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; color: white; -webkit-font-smoothing: antialiased;
    }

    /* Fixed Background Layers for Zero Scroll Lag */
    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; transform: translateZ(0); }
    .nebula { background: radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(50, 150, 255, 0.1) 0%, transparent 50%); filter: blur(30px); }
    .falling-stars { background: transparent url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; animation: drift 100s linear infinite; }
    .meteor { position: absolute; width: 150px; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%); opacity: 0; transform: rotate(-45deg); will-change: transform, opacity; }
    .meteor:nth-child(1) { top: -10%; left: 30%; animation: shoot 4s linear infinite 1s; }
    .meteor:nth-child(2) { top: -20%; left: 70%; animation: shoot 6s linear infinite 3s; }
    .meteor:nth-child(3) { top: 10%; left: 110%; animation: shoot 5s linear infinite 0s; }

    /* Ultra Clear Main Glass Box */
    .glass-box {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.25); border-left: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px; padding: 3rem 2rem; width: 100%; max-width: 900px;
      text-align: center; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.02);
      margin: 2rem 0; transform: translateZ(0);
    }

    .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .btn-glass { display: inline-block; padding: 10px 20px; color: white; text-decoration: none; font-weight: 500; letter-spacing: 1px; font-size: 0.9rem; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0)); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; transition: all 0.3s ease; backdrop-filter: blur(4px); }
    .btn-glass:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; background: linear-gradient(to right, #ffffff, #c7b8ff, #ffec8c); -webkit-background-clip: text; color: transparent; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
    p { color: #e0e0eb; font-size: clamp(1rem, 4vw, 1.3rem); letter-spacing: 2px; margin: 10px 0 30px; font-weight: 300; }

    /* Community Links Grid */
    .social-grid { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 30px; }
    @media (min-width: 768px) { .social-grid { flex-direction: row; justify-content: center; } }

    .social-card {
      width: 100%; max-width: 280px; text-decoration: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.25); border-left: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px; padding: 25px; display: flex; flex-direction: column; align-items: center;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    }

    .social-card:hover {
      transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.4);
    }

    .social-icon { font-size: 3.5rem; margin-bottom: 15px; }
    .social-title { color: #fff; font-size: 1.3rem; font-weight: 600; margin-bottom: 5px; letter-spacing: 1px; }
    .social-desc { color: #b3b3cc; font-size: 0.9rem; font-weight: 300; line-height: 1.4; text-align: center; }

    /* Specific Card Accents */
    .tg-card:hover { box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3); }
    .wa-card:hover { box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }

    @keyframes drift { from { background-position: 0 0; } to { background-position: -1000px 1000px; } }
    @keyframes shoot { 0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; } 100% { transform: translateX(-1500px) translateY(1500px) rotate(-45deg); opacity: 0; } }
  </style>
</head>

                <a href="https://t.me/darkobr1t" target="_blank" class="social-card tg-card">
            <div class="social-icon">✈️</div>
            <div class="social-title">Telegram Hub</div>
            <div class="social-desc">Join for live giveaways, daily updates, and exclusive drops.</div>
        </a>

        <a href="https://wa.me/8801611026722" target="_blank" class="social-card wa-card">
            <div class="social-icon">💬</div>
            <div class="social-title">WhatsApp Support</div>
            <div class="social-desc">Need help with an order? Contact our live support team instantly.</div>
        </a>
    </div>
  </div>
</body>
