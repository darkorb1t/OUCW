<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Universe - Explore the Mysteries</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(135deg, #03010a 0%, #0b1626 40%, #100a1c 70%, #05020c 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; 
      color: white;
      -webkit-font-smoothing: antialiased;
    }

    .bg-layer {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      transform: translateZ(0);
    }

    .nebula {
      background: 
        radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(50, 150, 255, 0.1) 0%, transparent 50%);
      filter: blur(30px);
    }

    .falling-stars {
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.4;
      animation: drift 100s linear infinite;
    }

    .meteor {
      position: absolute;
      width: 150px; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
      opacity: 0;
      transform: rotate(-45deg);
      will-change: transform, opacity;
    }

    .meteor:nth-child(1) { top: -10%; left: 30%; animation: shoot 4s linear infinite 1s; }
    .meteor:nth-child(2) { top: -20%; left: 70%; animation: shoot 6s linear infinite 3s; }
    .meteor:nth-child(3) { top: 10%; left: 110%; animation: shoot 5s linear infinite 0s; }

    .glass-box {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
      backdrop-filter: blur(4px); 
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      border-left: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 3rem 2rem;
      width: 100%; max-width: 900px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.02);
      margin: 2rem 0;
      transform: translateZ(0);
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem); 
      margin: 0;
      background: linear-gradient(to right, #ffffff, #c7b8ff, #ffc2eb);
      -webkit-background-clip: text; color: transparent; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
    
    p { 
      color: #e0e0eb; font-size: clamp(1rem, 4vw, 1.3rem); 
      letter-spacing: 2px; margin: 10px 0 30px; font-weight: 300;
    }

    .explore-container {
      width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 25px;
    }

    @media (min-width: 768px) {
      .explore-container { flex-direction: row; justify-content: center; flex-wrap: wrap; }
    }

    /* Cards ekhon <a> tag hobe, tai default link style remove korlam */
    .galaxy-card {
        width: 100%; max-width: 270px;
        aspect-ratio: 3/4;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
        backdrop-filter: blur(4px); 
        -webkit-backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(255, 255, 255, 0.25);
        border-left: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 16px;
        overflow: hidden;
        display: flex; flex-direction: column; align-items: center;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        transform: translateZ(0);
        text-decoration: none; /* Link er underline bad dilam */
        cursor: pointer;
    }
    
    .galaxy-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        border-top: 1px solid rgba(255, 255, 255, 0.4);
        border-left: 1px solid rgba(255, 255, 255, 0.4);
    }

    .card-image-stub {
        width: 100%; height: 55%; 
        background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .card-text { padding: 20px; width: 100%; text-align: left; }
    .card-title { color: #fff; font-weight: 500; font-size: 1.2rem; margin-bottom: 8px; letter-spacing: 1px; }
    .card-desc { color: #b3b3cc; font-size: 0.9rem; font-weight: 300; line-height: 1.4; }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: -1000px 1000px; }
    }

    @keyframes shoot {
      0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 1; }
      100% { transform: translateX(-1500px) translateY(1500px) rotate(-45deg); opacity: 0; }
    }
    .btn-glass {
  display: inline-block; padding: 10px 20px; color: white; text-decoration: none;
  font-weight: 500; letter-spacing: 1px; font-size: 0.9rem; margin: 0 10px 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
  border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px;
  transition: all 0.3s ease; backdrop-filter: blur(4px);
}
.btn-glass:hover {
  background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
    
  </style>  
</head>
<body>
  <div class="bg-layer nebula"></div>
  <div class="bg-layer falling-stars"></div>
  <div class="bg-layer">
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
  </div>
  
  <div class="glass-box">
    <div>
    <a href="store.html" class="btn-glass">🛍️ Orbit Store</a>
    <a href="#" class="btn-glass">🎁 Giveaways</a>
    </div>
    
    <h1>Orbit Universe</h1>
    <p>EXPLORE THE MYSTERIES</p>

    <div class="explore-container">
        <a href="explore.html" class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Antennae Galaxies</div>
                <div class="card-desc">Cosmic dance of collision and creation.</div>
            </div>
        </a>

        <a href="hoag.html" class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Hoag's Object</div>
                <div class="card-desc">An impossible ring galaxy formation.</div>
            </div>
        </a>

        <a href="veil.html" class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Veil Nebula</div>
                <div class="card-desc">A colourful supernova tapestry.</div>
            </div>
        </a>
    </div>
  </div>
</body>
</html>
