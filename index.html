<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Universe - Explore the Mysteries</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(45deg, #03010a 0%, #0b1626 25%, #1a1010 50%, #101620 75%, #05020c 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; color: white;
    }

    /* Fixed Backgrounds so they don't break on scroll */
    .nebulas, .cosmic-layer, .meteor-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
    }

    .nebulas {
      z-index: 1;
      background-image: 
        radial-gradient(circle at 10% 80%, rgba(16, 50, 80, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(80, 20, 20, 0.2) 0%, transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(200, 160, 40, 0.15) 0%, transparent 70%),
        linear-gradient(210deg, transparent, rgba(50, 180, 150, 0.1), transparent),
        linear-gradient(330deg, transparent, rgba(160, 20, 200, 0.08), transparent);
      filter: blur(5px);
      animation: nebulaPulse 25s ease infinite alternate;
    }

    .cosmic-layer {
      width: 300%; height: 300%; top: -100%; left: -100%;
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
      z-index: 1; opacity: 0.6;
      animation: rotateLayer 200s linear infinite;
    }

    .meteor {
      position: absolute; width: 100px; height: 3px;
      background: linear-gradient(to right, rgba(255,255,255,0), #ffffff, #c7b8ff);
      opacity: 0;
    }
    .meteor:nth-child(1) { top: 10%; left: 85%; animation: drop 4s linear infinite; }
    .meteor:nth-child(2) { top: 35%; left: 98%; animation: drop 5s linear infinite 1.5s; }
    .meteor:nth-child(3) { top: 5%; left: 60%; animation: drop 3s linear infinite 0.5s; }

    /* Ultra Clear Box - Fixed padding/width for mobile */
    .glass-box {
      z-index: 3;
      background: rgba(255, 255, 255, 0.005);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      width: 100%; max-width: 900px;
      text-align: center;
      box-shadow: 0 15px 45px rgba(255, 255, 255, 0.03), inset 0 0 25px rgba(255, 255, 255, 0.08);
      animation: float 6s ease-in-out infinite;
      margin: 2rem 0; /* Ensures it doesn't stick to screen edges */
    }

    h1 {
      font-size: clamp(2rem, 8vw, 4rem); 
      margin: 0;
      background: linear-gradient(45deg, #ffc2eb, #c7b8ff, #ffec8c);
      -webkit-background-clip: text; color: transparent; letter-spacing: 2px;
    }
    p { 
      color: #b3b3cc; font-size: clamp(0.9rem, 4vw, 1.4rem); 
      letter-spacing: 1px; margin: 10px 0 20px; font-weight: 300;
    }

    /* Stack cards vertically on mobile */
    .explore-container {
      width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    /* Change to row on wider screens */
    @media (min-width: 768px) {
      .explore-container { flex-direction: row; justify-content: space-between; }
    }

    .galaxy-card {
        width: 100%; max-width: 260px;
        aspect-ratio: 3/4;
        background: rgba(255, 255, 255, 0.015);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        overflow: hidden;
        display: flex; flex-direction: column; align-items: center;
    }

    .card-image-stub {
        width: 100%; height: 60%; background-color: #05020c; position: relative; overflow: hidden;
    }
    .card-image-stub::after {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background-image: radial-gradient(circle at 30% 30%, rgba(200, 160, 40, 0.2) 0%, transparent 60%), radial-gradient(circle at 70% 70%, rgba(16, 50, 80, 0.3) 0%, transparent 60%), linear-gradient(45deg, rgba(80, 20, 20, 0.2), rgba(160, 20, 200, 0.15));
        filter: blur(2px);
    }
    .card-image-stub.antennae::after { background-image: radial-gradient(circle at 30% 60%, rgba(200, 160, 40, 0.3) 0%, transparent 50%), radial-gradient(circle at 70% 30%, rgba(80, 20, 20, 0.35) 0%, transparent 50%), linear-gradient(210deg, transparent, rgba(50, 180, 150, 0.1), transparent); }
    .card-image-stub.hoag::after { background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 200, 0.2) 0%, transparent 30%), radial-gradient(circle at 50% 50%, transparent 35%, rgba(16, 50, 80, 0.3) 45%, transparent 60%); }

    .card-text { padding: 15px; width: 100%; text-align: left; }
    .card-title { color: #fff; font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
    .card-desc { color: #a3a3c2; font-size: 0.85rem; font-weight: 300; }

    @keyframes nebulaPulse { 0% { opacity: 0.8; } 100% { opacity: 1; } }
    @keyframes rotateLayer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes drop { 0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; width: 0; } 20% { width: 100px; } 100% { transform: translate(-900px, 900px) rotate(-45deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="nebulas"></div>
  <div class="cosmic-layer"></div>
  
  <div class="meteor-container">
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
  </div>
  
  <div class="glass-box">
    <div class="header-text">
        <h1>Orbit Universe</h1>
        <p>EXPLORE THE MYSTERIES</p>
    </div>

    <div class="explore-container">
        <div class="galaxy-card">
            <div class="card-image-stub antennae"></div>
            <div class="card-text">
                <div class="card-title">Antennae Galaxies</div>
                <div class="card-desc">Witness a cosmic dance of collision and star formation.</div>
            </div>
        </div>

        <div class="galaxy-card">
            <div class="card-image-stub hoag"></div>
            <div class="card-text">
                <div class="card-title">Hoag's Object</div>
                <div class="card-desc">An impossible ring galaxy, a cosmic curiosity.</div>
            </div>
        </div>

        <div class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Veil Nebula Remnant</div>
                <div class="card-desc">A colourful tapestry woven from a supernova's whisper.</div>
            </div>
        </div>
    </div>
  </div>
</body>
                  </html>
