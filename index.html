<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Universe - Explore the Mysteries</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0; padding: 2rem 1rem;
      background: linear-gradient(45deg, #03010a 0%, #0b1626 25%, #1a1010 50%, #101620 75%, #05020c 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden; 
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* Smooth scroll fix */
      color: white;
    }

    .nebulas, .cosmic-layer, .meteor-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      transform: translateZ(0); /* Hardware acceleration for lag fix */
    }

    .nebulas {
      z-index: 1;
      background-image: 
        radial-gradient(circle at 10% 80%, rgba(16, 50, 80, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(80, 20, 20, 0.2) 0%, transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(200, 160, 40, 0.15) 0%, transparent 70%);
      filter: blur(5px);
      animation: nebulaPulse 25s ease infinite alternate;
    }

    .cosmic-layer {
      width: 300%; height: 300%; top: -100%; left: -100%;
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
      z-index: 1; opacity: 0.6;
      animation: rotateLayer 200s linear infinite;
    }

    /* True Crystal Glass Box */
    .glass-box {
      z-index: 3;
      background: rgba(255, 255, 255, 0.01); /* High transparency */
      backdrop-filter: blur(8px); /* Lower blur for clear view */
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25); /* Sharp crisp border */
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      width: 100%; max-width: 900px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.1);
      margin: 2rem 0;
      transform: translateZ(0); /* Scroll glitch fix */
    }

    h1 {
      font-size: clamp(2rem, 8vw, 4rem); 
      margin: 0;
      background: linear-gradient(45deg, #ffc2eb, #c7b8ff, #ffec8c);
      -webkit-background-clip: text; color: transparent; letter-spacing: 2px;
    }
    
    p { 
      color: #b3b3cc; font-size: clamp(0.9rem, 4vw, 1.4rem); 
      letter-spacing: 1px; margin: 10px 0 20px; font-weight: 300;
    }

    .explore-container {
      width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    @media (min-width: 768px) {
      .explore-container { flex-direction: row; justify-content: space-between; }
    }

    /* True Crystal Galaxy Card */
    .galaxy-card {
        width: 100%; max-width: 260px;
        aspect-ratio: 3/4;
        background: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(6px); 
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        overflow: hidden;
        display: flex; flex-direction: column; align-items: center;
        transition: transform 0.3s ease;
        transform: translateZ(0);
    }
    
    .galaxy-card:hover {
        transform: translateY(-5px);
    }

    .card-image-stub {
        width: 100%; height: 60%; background-color: #05020c; position: relative; overflow: hidden;
    }
    
    .card-image-stub::after {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background-image: radial-gradient(circle at 30% 30%, rgba(200, 160, 40, 0.2) 0%, transparent 60%), radial-gradient(circle at 70% 70%, rgba(16, 50, 80, 0.3) 0%, transparent 60%);
        filter: blur(2px);
    }

    .card-text { padding: 15px; width: 100%; text-align: left; }
    .card-title { color: #fff; font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
    .card-desc { color: #a3a3c2; font-size: 0.85rem; font-weight: 300; }

    @keyframes nebulaPulse { 0% { opacity: 0.8; } 100% { opacity: 1; } }
    @keyframes rotateLayer { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="nebulas"></div>
  <div class="cosmic-layer"></div>
  
  <div class="glass-box">
    <div class="header-text">
        <h1>Orbit Universe</h1>
        <p>EXPLORE THE MYSTERIES</p>
    </div>

    <div class="explore-container">
        <div class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Antennae Galaxies</div>
                <div class="card-desc">Cosmic dance of collision.</div>
            </div>
        </div>

        <div class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Hoag's Object</div>
                <div class="card-desc">An impossible ring galaxy.</div>
            </div>
        </div>

        <div class="galaxy-card">
            <div class="card-image-stub"></div>
            <div class="card-text">
                <div class="card-title">Veil Nebula</div>
                <div class="card-desc">A colourful supernova tapestry.</div>
            </div>
        </div>
    </div>
  </div>
</body>
</html>
